<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="icon" type="image/svg+xml" href="favicon.svg" />
<title id="page-title">林林書林</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

<svg width="0" height="0" style="position:absolute; overflow:hidden;">
  <filter id="stamp-bleed" x="-30%" y="-30%" width="160%" height="160%">
    <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="7" result="noise"/>
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.7" xChannelSelector="R" yChannelSelector="G"/>
  </filter>
  <filter id="text-bleed" x="-20%" y="-20%" width="140%" height="140%">
    <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="2" seed="5" result="noise"/>
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.7" xChannelSelector="R" yChannelSelector="G"/>
  </filter>
  <filter id="logo-bleed" x="-20%" y="-20%" width="140%" height="140%">
    <feTurbulence type="fractalNoise" baseFrequency="0.6" numOctaves="2" seed="12" result="noise"/>
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.9" xChannelSelector="R" yChannelSelector="G"/>
  </filter>
</svg>

<div class="wrap">

  <a href="index.html" class="back-link">&larr; 一覧に戻る</a>

  <article id="detail-root"></article>

  <nav class="pager" id="pager"></nav>

</div>

<script src="data.js"></script>
<script>
  const params = new URLSearchParams(window.location.search);
  let id = parseInt(params.get("id"), 10);
  if (isNaN(id) || id < 0 || id >= BOOKS.length) id = 0;

  const book = BOOKS[id];
  document.getElementById("page-title").textContent = book.title.replace(/\n/g, "") + " ｜ 林林書林";

  const num = String(id + 1).padStart(2, "0");
  const yearLine = book.origYear
    ? `${book.year} 年刊（原著 ${book.origYear} 年）`
    : `${book.year} 年刊`;

  const descText = book.description && book.description.trim()
    ? book.description
    : "（後日記入）";
  const impText = book.impression && book.impression.trim()
    ? book.impression
    : "（後日記入）";
  const descClass = book.description && book.description.trim() ? "" : " is-empty";
  const impClass = book.impression && book.impression.trim() ? "" : " is-empty";

  const status = book.status || "read";
  const stampClass = "stamp--" + status;
  const stampText = { read: "読了", reading: "読書中", unread: "未読" }[status];
  // A stable pseudo-random angle per book, like individually hand-stamped cards.
  const stampAngle = ((((id + 1) * 37) % 17) - 8) + "deg";

  const READING_LOG_ROWS = 8;
  const log = book.log || [];
  let logRowsHtml = "";
  for (let i = 0; i < READING_LOG_ROWS; i++) {
    const entry = log[i];
    if (entry) {
      const logAngle = ((((id + 1) * 37 + (i + 1) * 53) % 21) - 10) + "deg";
      logRowsHtml += `
        <tr>
          <td><span class="return-card__value">${entry.date}</span></td>
          <td><span class="return-card__value">${entry.page || ""}</span></td>
          <td class="return-card__stampcol"><span class="return-card__stamp" style="--stamp-angle: ${logAngle}"></span></td>
        </tr>`;
    } else {
      logRowsHtml += `<tr><td>&nbsp;</td><td></td><td></td></tr>`;
    }
  }

  document.getElementById("detail-root").innerHTML = `
    <div class="catalog-card">
      <div class="catalog-card__entry">
        <p class="catalog-card__author">${book.author}</p>
        <p class="catalog-card__title">${book.title}</p>
        ${book.subtitle ? `<p class="catalog-card__subtitle">${book.subtitle}</p>` : ""}
        <p class="catalog-card__pub">${book.publisher ? book.publisher + "　" : ""}${yearLine}</p>
      </div>

      <div class="stamp ${stampClass}" style="--stamp-angle: ${stampAngle}">${stampText}</div>
      <div class="catalog-card__hole"></div>
      <div class="catalog-card__reg-wrap">
        <img class="catalog-card__logo" src="logo.svg" alt="林林書林">
        <span class="catalog-card__reg">No.${num}</span>
      </div>
    </div>

    <div class="detail-body">
      <section class="detail-section">
        <span class="detail-section__label">購入</span>
        <a class="amazon-link" href="${book.amazon}" target="_blank" rel="noopener noreferrer">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" />
            <polyline points="15 3 21 3 21 9" />
            <line x1="10" y1="14" x2="21" y2="3" />
          </svg>
          Amazonで見る
        </a>
      </section>

      <section class="detail-section">
        <span class="detail-section__label">内容</span>
        <p class="detail-text${descClass}">${descText}</p>
      </section>

      <section class="detail-section">
        <span class="detail-section__label">感想</span>
        <p class="detail-text${impClass}">${impText}</p>
      </section>
    </div>

    <section class="return-card">
      <div class="return-card__title">${book.title.replace(/\n/g, "")}</div>
      <table class="return-card__table">
        <thead>
          <tr>
            <th>年　月　日</th>
            <th>頁</th>
            <th class="return-card__stampcol"></th>
          </tr>
        </thead>
        <tbody>
          ${logRowsHtml}
        </tbody>
      </table>
      <div class="return-card__footer">林林書林</div>
    </section>
  `;

  const hasPrev = id > 0;
  const hasNext = id < BOOKS.length - 1;
  const prevBook = hasPrev ? BOOKS[id - 1] : null;
  const nextBook = hasNext ? BOOKS[id + 1] : null;

  document.getElementById("pager").innerHTML = `
    <a class="pager__link pager__link--prev ${hasPrev ? "" : "pager__link--disabled"}"
       href="${hasPrev ? `book.html?id=${id - 1}` : "#"}">
      <span>&larr; 前へ</span>
      ${hasPrev ? `<span class="pager__label-title">${prevBook.title}</span>` : ""}
    </a>
    <a class="pager__home" href="index.html">一覧</a>
    <a class="pager__link pager__link--next ${hasNext ? "" : "pager__link--disabled"}"
       href="${hasNext ? `book.html?id=${id + 1}` : "#"}">
      <span>次へ &rarr;</span>
      ${hasNext ? `<span class="pager__label-title">${nextBook.title}</span>` : ""}
    </a>
  `;
</script>
</body>
</html>
