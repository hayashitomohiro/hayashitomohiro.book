<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="icon" type="image/svg+xml" href="favicon.svg" />
<title>読書の記録</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

<svg width="0" height="0" style="position:absolute; overflow:hidden;">
  <filter id="stamp-bleed" x="-30%" y="-30%" width="160%" height="160%">
    <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="7" result="noise"/>
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.7" xChannelSelector="R" yChannelSelector="G"/>
  </filter>
  <filter id="text-bleed" x="-20%" y="-20%" width="140%" height="140%">
    <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="2" seed="5" result="noise"/>
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.7" xChannelSelector="R" yChannelSelector="G"/>
  </filter>
</svg>

<div class="wrap">

  <header class="site-header">
    <span class="site-header__eyebrow">Reading Log</span>
    <h1 class="site-title">読書の記録</h1>
    <div class="site-meta">
      <span>林朋紘</span>
      <span class="site-meta__count" id="book-count"></span>
    </div>
  </header>

  <ul class="book-list" id="book-list"></ul>

  <footer class="site-footer">
    order — 記載順
  </footer>

</div>

<script src="data.js"></script>
<script>
  const listEl = document.getElementById("book-list");
  const countEl = document.getElementById("book-count");
  countEl.textContent = BOOKS.length + " 冊";

  BOOKS.forEach((book, i) => {
    const li = document.createElement("li");
    li.className = "book-row";

    const num = String(i + 1).padStart(2, "0");
    const yearText = book.origYear
      ? `${book.year}<span style="opacity:.6"> (${book.origYear})</span>`
      : `${book.year}`;
    const status = book.status || "read";
    const dotClass = "status-dot--" + status;
    const dotTitle = { read: "読了", reading: "読書中", unread: "未読" }[status];

    li.innerHTML = `
      <a href="book.html?id=${i}">
        <span class="book-row__num">${num}</span>
        <span class="book-row__title">${book.title}</span>
        <span class="book-row__subtitle">${book.subtitle || "&nbsp;"}</span>
        <span class="book-row__author">${book.author}</span>
        <span class="book-row__year">
          <span class="status-dot ${dotClass}" title="${dotTitle}"></span>
          ${yearText}
        </span>
        ${book.publisher ? `<span class="book-row__publisher">${book.publisher}</span>` : ""}
      </a>
    `;
    listEl.appendChild(li);
  });
</script>
</body>
</html>
