<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <filter id="bleed" x="-30%" y="-30%" width="160%" height="160%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="7" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.7" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>

  <g filter="url(#bleed)">
    <circle cx="32" cy="32" r="25" fill="none" stroke="#8a3a2a" stroke-width="3"/>
    <text
      x="32"
      y="34"
      text-anchor="middle"
      dominant-baseline="central"
      font-family="'Yu Mincho', '游明朝', 'Hiragino Mincho ProN', serif"
      font-size="34"
      font-weight="700"
      fill="#8a3a2a"
    >本</text>
  </g>
</svg>
